on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'book/**'

name: Publish Quarto Book

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allows pushing to gh-pages branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'  # Confirm this matches your project's needs

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglu1-mesa-dev libgl1-mesa-dev xvfb \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libnetcdf-dev \
            libudunits2-dev \
            libproj-dev libgdal-dev

      - name: Install R packages
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: book  # Path to your Quarto project
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}